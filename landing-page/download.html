<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>下载 · 安得云荟</title>

    <!-- ===== 网站图标 ===== -->
    <link rel="icon" type="image/png" href="logo.png" />

    <!-- ===== Lucide 图标库 ===== -->
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/lucide-static/0.344.0/font/lucide.min.css" onload="this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide-static/0.344.0/font/lucide.min.css"></noscript>

    <style>
        /* ===== 莫兰迪配色 ===== */
        :root {
            --bg: #f4f2ec;
            --surface: #fcfaf7;
            --surface-hover: #f0ede8;
            --text-primary: #3d3a36;
            --text-secondary: #8a8580;
            --text-muted: #b5b0aa;
            --border: #e5e0da;
            --accent: #b8a9c9;
            --shadow: rgba(60, 58, 55, 0.06);
            --radius: 1.2rem;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem 4rem;
        }

        .container {
            max-width: 820px;
            width: 100%;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1.8rem;
            background: var(--surface);
            border-radius: 3rem;
            border: 1px solid var(--border);
            box-shadow: 0 2px 12px var(--shadow);
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo i {
            color: var(--accent);
            font-size: 1.6rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-links a:hover {
            color: var(--text-primary);
        }
        .nav-links .btn-ghost {
            background: var(--surface-hover);
            padding: 0.3rem 1.4rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .nav-links .btn-ghost:hover {
            background: var(--border);
        }

        /* ===== 下载页标题 ===== */
        .download-hero {
            text-align: center;
            padding: 0.5rem 0 2rem;
        }
        .download-hero h1 {
            font-size: 2.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .download-hero h1 i {
            color: var(--accent);
        }
        .download-hero .sub {
            color: var(--text-secondary);
            margin-top: 0.3rem;
            font-size: 1.05rem;
        }

        /* ===== 下载卡片列表 ===== */
        .download-cards {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .download-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 1.5rem 2rem;
            transition: box-shadow var(--transition);
        }
        .download-card:hover {
            box-shadow: 0 8px 24px var(--shadow);
        }

        /* ===== 平台头部 ===== */
        .platform-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }
        .platform-icon {
            font-size: 1.6rem;
            color: var(--accent);
        }
        .platform-name {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 0.1rem 0.8rem;
            border-radius: 2rem;
            font-weight: 500;
        }
        .status-badge.available {
            background: #d4e0d4;
            color: #3d6b3d;
        }
        .status-badge.coming {
            background: #ede8f0;
            color: #8a8580;
        }

        /* ===== 平台主体（按钮区） ===== */
        .platform-body {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem 1.2rem;
        }

        /* 最新版大按钮 */
        .btn-download-primary {
            background: var(--accent);
            color: #fff;
            padding: 0.7rem 2.4rem;
            border-radius: 3rem;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            transition: background var(--transition), transform var(--transition);
            box-shadow: 0 4px 16px rgba(184, 169, 201, 0.3);
            flex-shrink: 0;
        }
        .btn-download-primary:hover {
            background: #a898b8;
            transform: translateY(-2px);
        }
        .btn-download-primary.disabled {
            background: var(--surface-hover);
            color: var(--text-muted);
            pointer-events: none;
            box-shadow: none;
        }

        /* 次新版小按钮 */
        .older-versions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .older-versions .sep {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .btn-download-secondary {
            background: var(--surface-hover);
            color: var(--text-secondary);
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid var(--border);
            transition: background var(--transition), border-color var(--transition);
        }
        .btn-download-secondary:hover {
            background: var(--border);
            border-color: #ccc6c0;
        }
        .btn-download-secondary.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* ===== 各平台历史版本链接（卡片内） ===== */
        .history-link {
            margin-left: auto;
            flex-shrink: 0;
        }
        .history-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: color var(--transition);
            white-space: nowrap;
        }
        .history-link a:hover {
            color: var(--text-primary);
        }

        /* ===== 底部总历史版本链接（GitHub） ===== */
        .release-link {
            text-align: center;
            margin: 1.5rem 0 2rem;
        }
        .release-link a {
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color var(--transition);
            font-size: 0.95rem;
        }
        .release-link a:hover {
            color: var(--text-primary);
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color var(--transition);
        }
        .footer a:hover {
            color: var(--text-primary);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
                padding: 0.8rem 1.2rem;
            }
            .nav-links {
                justify-content: center;
                gap: 1rem;
            }
            .download-card {
                padding: 1.2rem 1.2rem;
            }
            .platform-body {
                flex-direction: column;
                align-items: stretch;
                gap: 0.6rem;
            }
            .btn-download-primary {
                justify-content: center;
                padding: 0.6rem 1.6rem;
                font-size: 0.95rem;
            }
            .older-versions {
                justify-content: center;
            }
            .history-link {
                margin-left: 0;
                text-align: center;
            }
            .history-link a {
                white-space: normal;
            }
            .download-hero h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

        </div>

        <!-- ===== 底部：总历史版本（指向 GitHub Releases） ===== -->

        <!-- ===== 页脚 ===== -->
        <footer class="footer">
            <span>© 2026 安得云荟 · Rosary</span>
            <div>
                <a href="privacy.html"><i class="lucide lucide-shield"></i> 隐私政策</a>

            </div>
        </footer>

    </div>
</body>
</html>
