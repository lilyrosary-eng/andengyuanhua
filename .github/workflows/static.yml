name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 可选，升级方案二选一
    steps:
      - name: Checkout
        uses: actions/checkout@v5        # 升级到 v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5       # 升级到 v5
        with:
          version: "10.11.1"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      # ========== 生成 waiting pages ==========
      - name: Generate waiting pages
        run: node scripts/gen-waiting-pages.mjs

      - name: Copy waiting files
        run: node scripts/copy-waiting.mjs

      # ========== 构建 ==========
      - name: Build project
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5    # 升级到 v5
