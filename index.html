<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src-tauri/icons/32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>安得云荟</title>
    <style>
      /* 防白屏：脚本执行前先给页面一个底色（浅色默认，深色由预加载脚本切换） */
      html, body { margin: 0; height: 100%; background: #f4f2ec; }
      body { overflow: hidden; }
    </style>
    <script>
      // ===== 定制加载层（哥特风 · 浅/深双主题） =====
      // 设计目标（按用户要求）：
      // 1) 软件开启后【先】只加载哥特加载界面 + 识别浅/深模式，【再】加载其它（React 应用）；
      // 2) 杜绝主题色空白：本脚本在 <head> 同步执行，创建 #boot 并立即铺底色，
      //    早于 <body> 绘制，因此首帧即为哥特加载界面，不会露出原生窗口主题底色；
      // 3) 加载层必定自毁：window load + 硬超时兜底，任何异常都不会让全屏层永久遮挡点击。
      (function () {
        function getSystemDark() {
          return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        }
        function resolveDark() {
          var t = null;
          try { t = localStorage.getItem('theme'); } catch (e) {}
          if (t === 'dark') return true;
          if (t === 'light') return false;
          return getSystemDark();
        }

        var dark = resolveDark();
        var bg = dark
          ? 'linear-gradient(160deg,#14141a,#1c1c24)'
          : 'linear-gradient(160deg,#f4f2ec,#ece9e1)';
        var ink = dark ? '#ccc8be' : '#3a3a37';
        var accent = dark ? '#9b8fb5' : '#8b948a';

        // 立即给 html / body 铺同款渐变，避免 webview 原生窗口闪出主题色空白
        document.documentElement.classList.toggle('dark', dark);
        try {
          document.documentElement.style.background = bg;
          document.body.style.background = bg;
        } catch (e) {}

        // 浮窗 / 覆盖层子窗口（floating-note / floating-clipboard / floating-dropzone /
        // lyrics-widget / tray-menu 等）一律不跑哥特加载页，保证「即点即用」、
        // 轻量高效、毫秒级响应。仅主窗口（无 query）才展示加载层。
        if (/[?&](floating|overlay|widget)=/.test(location.search)) return;


        // ---- 真实进度引擎 ----
        var state = { target: 0, current: 0, done: false, dom: null, text: '', phase: '' };
        var raf = null;

        function apply() {
          var d = state.dom;
          if (!d) return;
          var fill = d.fill || d.bootFill;
          if (fill) {
            fill.style.transition = 'none';
            fill.style.width = state.current.toFixed(2) + '%';
          }
          if (d.pct) d.pct.textContent = Math.floor(state.current) + '%';
          if (d.st && state.text) d.st.textContent = state.text;
          if (d.ph && state.phase) d.ph.textContent = state.phase;
        }

        function bindDom() {
          var b = document.getElementById('boot');
          if (!b) return;
          // iframe 模式下 #boot 是 <iframe>，需经 contentDocument 取内部节点；
          // 兜底（内联）模式下 #boot 即普通 <div>，直接用自身。
          var doc = b.contentDocument || b;
          state.dom = {
            fill: doc.querySelector('.progress .fill') || doc.querySelector('#bootFill'),
            pct: doc.querySelector('.progress .pct'),
            st: doc.querySelector('#statusText'),
            ph: doc.querySelector('#phase'),
          };
          apply();
        }

        // 哥特加载页最短展示时长：即便应用「秒开」，也保证用户真正看到加载界面，
        // 避免加载层一闪即逝、看起来像「哥特页没生效」。计时从 boot 层创建（本 IIFE）起算。
        var BOOT_START = Date.now();
        window.__bootT0 = BOOT_START;
        // 排查用：统一带「自启动起经过毫秒数」的日志前缀，devtools 控制台可观察预热时序
        function blog(tag) { console.log('[boot] +' + (Date.now() - BOOT_START) + 'ms ' + tag); }
        blog('加载层已创建（哥特页开始）');
        var MIN_BOOT_MS = 1500;
        var _finishScheduled = false;

        function dismissBoot() {
          if (dismissBoot._done) return;
          dismissBoot._done = true;
          if (raf) { cancelAnimationFrame(raf); raf = null; }
          var b = document.getElementById('boot');
          if (!b) return;
          // 立即让加载层不再拦截点击（即使淡出动画进行中），杜绝"点不了"
          b.style.pointerEvents = 'none';
          b.style.transition = 'opacity .45s ease';
          b.style.opacity = '0';
          setTimeout(function () {
            if (b && b.parentNode) b.parentNode.removeChild(b);
          }, 480);
        }

        function finish() {
          if (_finishScheduled) return;
          _finishScheduled = true;
          // 应用就绪但不足最短时长 → 延迟到最短时长再淡出，确保加载页真实可见；
          // 应用慢于最短时长 → 直接淡出（不会提前露出未就绪的主程序）。
          var remain = MIN_BOOT_MS - (Date.now() - BOOT_START);
          if (remain > 0) setTimeout(dismissBoot, remain);
          else dismissBoot();
        }

        function tick() {
          // 若加载层已被移除，立即停止进度循环，避免空转 rAF
          if (!document.getElementById('boot')) { return; }
          if (state.done) {
            // 真正完成（两门控通过）即满：此时 __bootProgress(100) 已由门控进度函数下发，
            // 进度条与真实就绪同步，不再有「假满后干等」。最短展示时长由 finish() 的 MIN_BOOT_MS 兜底。
            var goal = 100;
            if (state.current < goal) {
              state.current += Math.max(0.6, (goal - state.current) * 0.12);
              if (state.current > goal) state.current = goal;
            }
          } else if (state.current < state.target) {
            state.current += Math.max(0.4, (state.target - state.current) * 0.08);
            if (state.current > state.target) state.current = state.target;
          }
          apply();
          if (state.done && state.current >= 99.5) { finish(); return; }
          raf = requestAnimationFrame(tick);
        }
        function ensureRaf() { if (!raf) raf = requestAnimationFrame(tick); }

        window.__bootProgress = function (pct, opts) {
          opts = opts || {};
          if (typeof pct === 'number') state.target = Math.max(state.target, Math.min(100, pct));
          if (opts.text) state.text = opts.text;
          if (opts.phase) state.phase = opts.phase;
          bindDom();
          ensureRaf();
        };
        window.__bootDone = function (opts) {
          if (state.done) return;
          blog('__bootDone 触发 → 进入淡出');
          state.done = true;
          if (opts && opts.text) state.text = opts.text;
          if (opts && opts.phase) state.phase = opts.phase;
          bindDom();
          ensureRaf();
        };

        // 主窗口门控：load 事件仅标记「底层已加载」，真正收尾由主窗口 finishBoot 置 gate 后触发；8s 硬超时仍是最后兜底
        window.__bootGate = window.__bootGate || { notes: false, overlays: false, appLoaded: false };
        // 进度条实时跟随真实里程碑：基础进度由 __bootProgress 真实上报（最高 90%），
        // 最后 10% 严格绑定「门控」——笔记就绪 + 浮窗预热完成，二者皆满足才补满到 100%，
        // 杜绝「进度到 100 却还在等预热」的假满。仅当某一门控先完成时给到 92/95 过渡值。
        window.__bootGateProgress = function () {
          var g = window.__bootGate;
          if (g.notes && g.overlays) window.__bootProgress(100, { text: '准备就绪', phase: 'PHASE 05 / 05' });
          else if (g.overlays) window.__bootProgress(95, { text: '预热浮窗', phase: 'PHASE 05 / 05' });
          else if (g.notes) window.__bootProgress(92, { text: '预热浮窗', phase: 'PHASE 05 / 05' });
        };
        window.__tryBootFinish = function () {
          blog('tryBootFinish gates: notes=' + window.__bootGate.notes + ' overlays=' + window.__bootGate.overlays);
          window.__bootGateProgress();
          if (window.__bootGate.notes && window.__bootGate.overlays) window.__bootDone();
          else blog('tryBootFinish 未满足门控，加载层继续等待');
        };
        window.addEventListener('load', function () {
          window.__bootGate.appLoaded = true;
          window.__tryBootFinish();
        });
        // 最后兜底：绝不绕过门控直接收尾（否则预热未完成就淡出 → 笔记页出现后仍在建窗、闪现实体浮窗）。
        // 这里强制补全门控（notes+overlays）再尝试收尾；正常情况预热早于此已置 gate，本分支仅作极端兜底。
        // 排查期临时拉到 25s（原 12s），给预热更充裕时间定位实际耗时，确保「浮窗预热」尽量在加载页内一次性跑完（单一阶段）。
        setTimeout(function () {
          blog('硬超时(25s)触发：强制补全门控兜底收尾');
          if (!state.done) {
            window.__bootGate.notes = true;
            window.__bootGate.overlays = true;
            window.__tryBootFinish();
          }
        }, 25000);

        // ===== 全量哥特加载页（iframe 隔离，Vite 构建时注入 base64，零外部依赖）=====
        (function installBootHtml() {
          try {
            // atob() 返回 Latin-1 二进制字符串，需用 TextDecoder 正确解码 UTF-8
            // 否则中文（安得云荟、建立连接…等）会乱码
            var b64 = dark ? "___WAITING_DARK_B64___" : "___WAITING_LIGHT_B64___";
            var binStr = atob(b64);
            var bytes = new Uint8Array(binStr.length);
            for (var i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
            var html = new TextDecoder('utf-8').decode(bytes);

            html = html.replace(/<head[^>]*>/i, function (m) {
              // 运行时注入 viewport meta：宽度 = 宿主窗口实际宽度（如 1100）。
              // 强制 iframe 内 vw/vh 绑定窗口实际宽度，而非 WebView2 默认的「设备逻辑宽度」，
              // 否则桌面打包版加载页装饰被放大、四角/玫瑰窗/水印溢出消失、只剩居中莲花。
              // 若 wait-page 已自带 viewport（其内联脚本注入），则不重复添加，避免双 meta。
              if (/<meta\s+name=["']viewport["']/i.test(html)) return m;
              return m + '<meta name="viewport" content="width=' + window.innerWidth + '">';
            });
            var ifr = document.createElement('iframe');
            ifr.id = 'boot';
            ifr.setAttribute('title', '加载中');
            ifr.setAttribute('aria-hidden', 'true');
            ifr.style.cssText =
              'position:fixed;inset:0;z-index:2147483646;border:0;width:100%;height:100%;' +
              'background:' + bg + ';';
            ifr.onload = function () {
              bindDom(); apply();
              // 自愈：检测 srcdoc 内联样式/脚本是否生效，未生效则 CSP 免疫重注（见下方 try 块）
              try {
                var idoc = ifr.contentDocument;
                if (idoc && idoc.body) {
                  // —— 自修复：打包版 srcdoc 偶发不执行内联 <style>/<script>，致装饰塌陷、rose=0 ——
                  // 用 CSP 免疫的方式注入：样式走 adoptedStyleSheets（构造样式表，不受 style-src 限制），
                  // 脚本走 eval（配置允许 'unsafe-eval'，绕过内联脚本 CSP）；均失败时兜底注入 <style>/<script> 元素。
                  var _healStyle = false, _healScript = false;
                  try {
                    var _appEl = idoc.querySelector('.app');
                    var _styleOk = !!(_appEl && /flex/.test(getComputedStyle(_appEl).display));
                    if (!_styleOk) {
                      var _sm = html.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
                      if (_sm) {
                        var _css = _sm[1];
                        try {
                          if (idoc.adoptedStyleSheets && idoc.defaultView.CSSStyleSheet) {
                            var _sheet = new idoc.defaultView.CSSStyleSheet();
                            _sheet.replaceSync(_css);
                            idoc.adoptedStyleSheets = [_sheet];
                            _healStyle = true;
                          }
                        } catch (_csse) { console.log('[boot-heal-css-err]', _csse && _csse.message); }
                        if (!_healStyle) {
                          var _st = idoc.createElement('style');
                          _st.textContent = _css;
                          (idoc.head || idoc.documentElement).appendChild(_st);
                          _healStyle = true;
                        }
                      }
                    }
                    var _roseG = idoc.getElementById('roseG');
                    if (!_roseG || _roseG.childElementCount === 0) {
                      var _scrs = html.match(/<script>([\s\S]*?)<\/script>/gi) || [];
                      var _init = null;
                      for (var _i = _scrs.length - 1; _i >= 0; _i--) {
                        if (/buildRose/.test(_scrs[_i])) { _init = _scrs[_i]; break; }
                      }
                      if (_init) {
                        var _code = _init.replace(/^<script>/i, '').replace(/<\/script>\s*$/i, '');
                        try {
                          idoc.defaultView.eval(_code);
                          _healScript = true;
                        } catch (_evale) {
                          try {
                            var _sc = idoc.createElement('script');
                            _sc.textContent = _code;
                            (idoc.body || idoc.documentElement).appendChild(_sc);
                            _healScript = true;
                          } catch (_sce) { console.log('[boot-heal-script-err]', _sce && _sce.message); }
                        }
                      }
                    }
                  } catch (_he) { console.log('[boot-heal-err]', _he && _he.message); }
                }
              } catch (e) {}
            };
            // 窗口尺寸变化时同步更新 iframe 内 viewport，保持 vw 与窗口一致
            window.addEventListener('resize', function () {
              try {
                var idoc = ifr.contentDocument;
                if (!idoc) return;
                var vm = idoc.querySelector('meta[name="viewport"]');
                if (vm) vm.setAttribute('content', 'width=' + window.innerWidth);
              } catch (e) {}
            });
            document.documentElement.appendChild(ifr);
            ifr.srcdoc = html;
          } catch (e) {
            // 解码或 iframe 创建失败时，用内联兜底加载层（保证不白屏）
            var div = document.createElement('div');
            div.id = 'boot';
            div.style.cssText =
              'position:fixed;inset:0;z-index:2147483647;display:flex;flex-direction:column;' +
              'align-items:center;justify-content:center;background:' + bg + ';' +
              'color:' + ink + ';font-family:serif;';
            div.innerHTML =
              '<div style="font-size:28px;letter-spacing:4px;margin-bottom:24px;font-family:Cinzel,Playfair Display,serif;">安得云荟</div>' +
              '<div class="progress" style="width:240px;height:2px;background:rgba(128,128,128,.2);overflow:hidden;">' +
              '<div class="fill" style="width:0%;height:100%;background:' + accent + ';transition:width .3s ease;"></div></div>' +
              '<div id="statusText" style="margin-top:12px;font-size:12px;opacity:.6;"></div>' +
              '<div id="phase" style="margin-top:4px;font-size:10px;opacity:.4;letter-spacing:2px;"></div>';
            document.documentElement.appendChild(div);
            bindDom();
          }
        })();
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
